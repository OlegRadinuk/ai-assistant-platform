# nginx server block — app.optisphere.tech → ai-assistant-platform (port 3100)
#
# SUBDOMAIN: to change, replace "app.optisphere.tech" with your target subdomain (3 occurrences).
# PORT:      to change, replace "3100" with the port set in ecosystem.config.js.
#
# Install:
#   sudo cp deploy/nginx-app.optisphere.tech.conf /etc/nginx/sites-available/app.optisphere.tech
#   sudo ln -s /etc/nginx/sites-available/app.optisphere.tech /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain SSL:
#   sudo certbot --nginx -d app.optisphere.tech
# Certbot will rewrite the SSL section automatically.

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.optisphere.tech;

    # certbot will add its ACME challenge location here
    return 301 https://$host$request_uri;
}

# HTTPS — filled in by certbot; shown here as a template
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.optisphere.tech;

    # --- SSL (certbot will replace these paths) ---
    ssl_certificate     /etc/letsencrypt/live/app.optisphere.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.optisphere.tech/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # --- Proxy to Next.js ---
    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR / streaming)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Real IP forwarding
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts (generous for AI streaming responses)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # Public files
    location /public/ {
        proxy_pass http://127.0.0.1:3100;
    }

    # Upload size — increase if assistants accept file attachments later
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/x-javascript text/xml application/xml;
}
